<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIおぢ | Premium Coaching</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icons/avatar.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <img src="icons/avatar.jpg" alt="AIおぢ" class="header-avatar">
                <div class="header-text">
                    <h1>AIおぢ</h1>
                    <span class="status-badge">Professional Coach</span>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="chat">チャット</button>
                <button class="tab-btn" data-tab="kb">ナレッジ設定</button>
            </nav>
        </header>

        <main>
            <!-- Chat Screen -->
            <section id="chat-screen" class="tab-content active">
                <div id="chat-messages" class="chat-messages">
                    <div class="message bot">
                        <div class="message-content">
                            やあ。AIおぢだ。今日はどんな話をしようか？君が抱えている課題や、もっと良くしていきたいと思っていることを聞かせてほしい。
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea id="user-input" placeholder="メッセージを入力..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" title="送信">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M3.4 20.4L20.85 12L3.4 3.6L3.4 10.2L15.3 12L3.4 13.8L3.4 20.4Z"></path>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Knowledge Base Screen -->
            <section id="kb-screen" class="tab-content">
                <div class="kb-container">
                    <h2>ナレッジ登録</h2>
                    <p class="kb-desc">ここにテキストを貼り付けると、AIおぢがそれを学習（コンテキスト化）して回答に反映します。会社情報や特定のナレッジを教えてください。</p>
                    <textarea id="kb-input" placeholder="例：弊社のミッションは..."></textarea>
                    <button id="save-kb-btn" class="primary-btn">ナレッジを保存する</button>
                </div>
            </section>
        </main>
    </div>

    <!-- PWA Installation Prompt -->
    <div id="install-banner" class="install-banner hidden">
        <span>AIおぢをホーム画面に追加しますか？</span>
        <button id="install-btn">追加する</button>
    </div>

    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
