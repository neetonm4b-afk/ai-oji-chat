<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIおぢ - Coaching Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="apple-touch-icon" href="icons/avatar.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <img src="icons/avatar.jpg" alt="AIおぢ" class="header-avatar">
                <div class="header-text">
                    <h1>AIおぢ</h1>
                    <span class="status-badge">Online Coaching</span>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="chat">チャット</button>
                <button class="tab-btn" data-tab="kb">ナレッジ登録</button>
            </nav>
        </header>

        <main>
            <!-- Chat Screen -->
            <section id="chat-screen" class="tab-content active">
                <div id="chat-messages" class="chat-messages">
                    <div class="message bot">
                        <div class="message-content">
                            こんにちは。私はAIおぢだ。今日はどんなことを一緒に考えていこうか？
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea id="user-input" placeholder="メッセージを入力..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Knowledge Base Screen -->
            <section id="kb-screen" class="tab-content">
                <div class="kb-container">
                    <h2>ナレッジベース登録</h2>
                    <p class="kb-desc">ここにテキストを貼り付けると、AIおぢがそれを学習して回答に反映します。</p>
                    <textarea id="kb-input" placeholder="ここに情報を入力して保存してください..."></textarea>
                    <button id="save-kb-btn" class="primary-btn">ナレッジを保存する</button>
                </div>
            </section>
        </main>
    </div>

    <!-- PWA Installation Prompt -->
    <div id="install-banner" class="install-banner hidden">
        <span>ホーム画面に追加してアプリとして使おう！</span>
        <button id="install-btn">追加</button>
    </div>

    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
